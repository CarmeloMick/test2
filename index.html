<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bus & Weather Dashboard (rt.data.gov.hk Edition)</title>
  <script src="config.js"></script>
  <style>
    /* 全局重設：確保無滾動條，完美填滿全屏 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* 主容器佈局 */
    .dashboard-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 2vh 2vw;
      gap: 2vh;
    }

    /* 區塊 A：時間與提示文字 */
    .block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #333333;
      padding-bottom: 1.5vh;
      height: 12vh;
    }
    .time-box {
      display: flex;
      flex-direction: column;
    }
    .time-digital {
      font-size: 5.5vh;
      font-weight: bold;
      color: #00ffcc;
      line-height: 1;
    }
    .date-text {
      font-size: 2.2vh;
      color: #aaaaaa;
      margin-top: 0.5vh;
    }
    .notice-box {
      font-size: 2.5vh;
      color: #ffffff;
      background-color: #1a1a1a;
      padding: 1.5vh 2vw;
      border-radius: 8px;
      max-width: 60%;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 中下部主內容分佈：橫屏預設 */
    .main-content {
      display: flex;
      flex: 1;
      gap: 2vw;
      min-height: 0;
    }

    /* 區塊 B：九巴 ETA 顯示板 */
    .block-bus {
      flex: 1.6;
      display: flex;
      flex-direction: column;
      gap: 1.5vh;
      min-height: 0;
    }
    .bus-row {
      flex: 1;
      display: flex;
      align-items: center;
      background-color: #111111;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 0 2vw;
    }
    .bus-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .bus-route {
      font-size: 5vh;
      font-weight: 900;
      color: #ffcc00;
      line-height: 1.1;
    }
    .bus-dest {
      font-size: 2.2vh;
      color: #cccccc;
      margin-top: 0.5vh;
    }
    .bus-eta-container {
      flex: 1.2;
      display: flex;
      justify-content: flex-end;
      gap: 3vw;
    }
    .eta-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      min-width: 10vw;
    }
    .eta-time {
      font-size: 4.5vh;
      font-weight: bold;
      color: #ffffff;
    }
    .eta-time.next-bus {
      color: #00ff00;
    }
    .eta-rmk {
      font-size: 1.6vh;
      color: #888888;
      margin-top: 0.2vh;
    }

    /* 區塊 C：即時天氣與警告 */
    .block-weather {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: #111111;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 2vh 2vw;
      gap: 2vh;
      min-height: 0;
    }
    .weather-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .weather-metrics {
      display: flex;
      flex-direction: column;
      gap: 1vh;
    }
    .temp-text {
      font-size: 7vh;
      font-weight: bold;
      color: #ffffff;
      line-height: 1;
    }
    .humidity-text, .uv-text {
      font-size: 2.5vh;
      color: #bbbbbb;
    }
    .weather-icon-box {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 12vh;
      height: 12vh;
    }
    .weather-icon-box img {
      height: 12vh;
      width: auto;
      object-fit: contain;
    }
    .weather-emoji {
      font-size: 8vh;
      line-height: 1;
    }

    /* 天氣警告訊號 */
    .warning-container {
      flex: 1;
      border-top: 1px solid #333333;
      padding-top: 1.5vh;
      display: flex;
      flex-direction: column;
      gap: 1vh;
      overflow-y: auto;
    }
    .warning-title {
      font-size: 2.2vh;
      color: #888888;
      font-weight: bold;
    }
    .warning-list {
      display: flex;
      flex-wrap: wrap;
      gap: 1vh;
    }
    .warning-badge {
      background-color: #cc0000;
      color: #ffffff;
      font-size: 2.2vh;
      font-weight: bold;
      padding: 0.8vh 1.5vw;
      border-radius: 6px;
      border: 1px solid #ff3333;
    }
    .warning-empty {
      font-size: 2.2vh;
      color: #00ff00;
      font-weight: bold;
    }

    /* 直屏 (Portrait) 響應式佈局 */
    @media (orientation: portrait) {
      .main-content { flex-direction: column; }
      .block-header { height: 10vh; }
      .time-digital { font-size: 4.5vh; }
      .notice-box { font-size: 2.2vh; }
      .block-bus { flex: 1.3; }
      .bus-route { font-size: 4.2vh; }
      .eta-time { font-size: 3.8vh; }
      .block-weather { flex: 1; }
      .temp-text { font-size: 6vh; }
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <header class="block-header">
      <div class="time-box">
        <div id="clock" class="time-digital">00:00:00</div>
        <div id="date-string" class="date-text">----年--月--日 星期-</div>
      </div>
      <div id="notice-board" class="notice-box">聯網中...</div>
    </header>

    <main class="main-content">
      <section id="bus-panel" class="block-bus"></section>

      <section class="block-weather">
        <div class="weather-info">
          <div class="weather-metrics">
            <div id="temp-display" class="temp-text">--°C</div>
            <div id="humidity-display" class="humidity-text">相對濕度：--%</div>
            <div id="uv-display" class="uv-text">UV 指數：--</div>
          </div>
          <div id="weather-icon" class="weather-icon-box"></div>
        </div>
        
        <div class="warning-container">
          <div class="warning-title">當前生效天氣警告：</div>
          <div id="warning-list" class="warning-list">
            <span class="warning-empty">正在獲取警告數據...</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // 驗證配置
    const config = window.DASHBOARD_CONFIG;
    if (!config) {
      document.body.innerHTML = "<h1 style='color:red;padding:20px;'>[Fatal] config.js 未成功加載。</h1>";
      throw new Error("Configuration is missing.");
    }

    const DOM = {
      clock: document.getElementById('clock'),
      dateString: document.getElementById('date-string'),
      noticeBoard: document.getElementById('notice-board'),
      busPanel: document.getElementById('bus-panel'),
      tempDisplay: document.getElementById('temp-display'),
      humidityDisplay: document.getElementById('humidity-display'),
      uvDisplay: document.getElementById('uv-display'),
      weatherIcon: document.getElementById('weather-icon'),
      warningList: document.getElementById('warning-list')
    };

    function updateClock() {
      const now = new Date();
      DOM.clock.textContent = now.toLocaleTimeString('zh-HK', { hour12: false });
      DOM.dateString.textContent = now.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    function getWeatherEmoji(iconId) {
      const id = parseInt(iconId, 10);
      if (id >= 50 && id <= 52) return "☀️";
      if (id >= 53 && id <= 54) return "🌤️";
      if (id >= 60 && id <= 61) return "☁️";
      if (id >= 62 && id <= 65) return "🌧️";
      if (id >= 70 && id <= 77) return "⛈️";
      if (id >= 80 && id <= 85) return "🌫️";
      if (id >= 90 && id <= 93) return "❄️";
      return "✨";
    }

    function initBusLayout() {
      DOM.noticeBoard.textContent = config.topNoticeText;
      DOM.busPanel.innerHTML = '';
      
      config.busRoutes.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'bus-row';
        row.innerHTML = `
          <div class="bus-meta">
            <div class="bus-route">${item.route}</div>
            <div class="bus-dest">${item.label || ''}</div>
          </div>
          <div class="bus-eta-container">
            <div class="eta-item">
              <div id="eta-${index}-0-time" class="eta-time next-bus">--</div>
              <div id="eta-${index}-0-rmk" class="eta-rmk"></div>
            </div>
            <div class="eta-item">
              <div id="eta-${index}-1-time" class="eta-time">--</div>
              <div id="eta-${index}-1-rmk" class="eta-rmk"></div>
            </div>
          </div>
        `;
        DOM.busPanel.appendChild(row);
      });
    }

    /**
     * 區塊 B：獲取九巴 ETA 數據（徹底對接正確的 rt.data.gov.hk 節點）
     */
    async function fetchBusETA() {
      const now = new Date();
      
      for (let i = 0; i < config.busRoutes.length; i++) {
        const target = config.busRoutes[i];
        if (!target.stopId || !target.route) continue;

        try {
          // 【終極修復】使用正確的實時交通專屬 Sub-domain。
          // 絕不附加 Query string，絕不自訂 Headers，交由瀏覽器直接發起最純粹的原生跨域 fetch。
          const url = `https://rt.data.gov.hk/v1/transport/kmb/stop-eta/${target.stopId}`;
          
          const response = await fetch(url);
          if (!response.ok) {
            document.getElementById(`eta-${i}-0-time`).textContent = `HTTP ${response.status}`;
            continue;
          }
          
          const json = await response.json();
          const filtered = (json.data || []).filter(item => item.route === target.route);
          const sorted = filtered.filter(item => item.eta).sort((a, b) => new Date(a.eta) - new Date(b.eta));

          for (let seq = 0; seq < 2; seq++) {
            const timeEl = document.getElementById(`eta-${i}-${seq}-time`);
            const rmkEl = document.getElementById(`eta-${i}-${seq}-rmk`);
            
            if (sorted[seq]) {
              const etaData = sorted[seq];
              const diffMins = Math.max(0, Math.floor((new Date(etaData.eta) - now) / 60000));
              timeEl.textContent = diffMins === 0 ? "即將到站" : `${diffMins} 分鐘`;
              rmkEl.textContent = etaData.rmk_tc || "";
            } else {
              timeEl.textContent = seq === 0 ? "暫無班次" : "--";
              rmkEl.textContent = "";
            }
          }
        } catch (error) {
          console.error(`Gov KMB API Error [${target.route}]:`, error);
          document.getElementById(`eta-${i}-0-time`).textContent = "讀取失敗";
        }
      }
    }

    /**
     * 區塊 C：獲取天文台數據
     */
    async function fetchWeather() {
      const cacheBust = `&_=${Date.now()}`;
      const weatherUrl = `https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc${cacheBust}`;
      const warningUrl = `https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc${cacheBust}`;

      try {
        const res = await fetch(weatherUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.temperature?.data?.length > 0) DOM.tempDisplay.textContent = `${data.temperature.data[0].value}°C`;
        if (data.humidity?.data?.length > 0) DOM.humidityDisplay.textContent = `相對濕度：${data.humidity.data[0].value}%`;
        if (data.uvindex?.data?.length > 0) {
          DOM.uvDisplay.textContent = `UV 指數：${data.uvindex.data[0].value}`;
          DOM.uvDisplay.style.display = 'block';
        } else {
          DOM.uvDisplay.style.display = 'none';
        }
        
        if (data.icon?.length > 0) {
          const iconId = data.icon[0];
          const fallbackEmoji = getWeatherEmoji(iconId);
          
          DOM.weatherIcon.innerHTML = `
            <img src="https://www.hko.gov.hk/images/HKOWeatherIcon/pic${iconId}.png" 
                 alt="Weather" 
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span class="weather-emoji" style="display:none;">${fallbackEmoji}</span>
          `;
        }
      } catch (e) { 
        console.error("Weather Error:", e); 
        DOM.tempDisplay.textContent = "網路錯誤"; 
      }

      try {
        const res = await fetch(warningUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const activeWarningKeys = Object.keys(data);

        if (activeWarningKeys.length === 0) {
          DOM.warningList.innerHTML = '<span class="warning-empty">現時無生效天氣警告</span>';
        } else {
          DOM.warningList.innerHTML = activeWarningKeys.map(key => `<span class="warning-badge">${data[key].name}</span>`).join('');
        }
      } catch (e) { 
        console.error("Warning Error:", e); 
        DOM.warningList.innerHTML = '<span style="color:#ff3333;">更新失敗</span>'; 
      }
    }

    function startScheduler() {
      async function updateAllData() {
        await Promise.allSettled([fetchBusETA(), fetchWeather()]);
      }
      setInterval(updateClock, 1000);
      setInterval(updateAllData, config.updateIntervalMs);
      updateClock();
      initBusLayout();
      updateAllData();
    }

    document.addEventListener('DOMContentLoaded', startScheduler);
  </script>
</body>
</html>
