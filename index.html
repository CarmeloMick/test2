<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bus & Weather Dashboard (Diagnostic Mode)</title>
  <script src="config.js"></script>
  <style>
    /* 全局重設：確保無滾動條，完美填滿全屏 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* 主容器佈局 */
    .dashboard-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 2vh 2vw;
      gap: 2vh;
    }

    /* 區塊 A：時間與提示文字 */
    .block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #333333;
      padding-bottom: 1.5vh;
      height: 12vh;
    }
    .time-box {
      display: flex;
      flex-direction: column;
    }
    .time-digital {
      font-size: 5.5vh;
      font-weight: bold;
      color: #00ffcc;
      line-height: 1;
    }
    .date-text {
      font-size: 2.2vh;
      color: #aaaaaa;
      margin-top: 0.5vh;
    }
    .notice-box {
      font-size: 2.2vh;
      color: #ffffff;
      background-color: #1a1a1a;
      padding: 1.5vh 2vw;
      border-radius: 8px;
      max-width: 70%;
      text-align: right;
    }

    /* 中下部主內容分佈 */
    .main-content {
      display: flex;
      flex: 1;
      gap: 2vw;
      min-height: 0;
    }

    .block-bus {
      flex: 1.6;
      display: flex;
      flex-direction: column;
      gap: 1.5vh;
      min-height: 0;
    }
    .bus-row {
      flex: 1;
      display: flex;
      align-items: center;
      background-color: #111111;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 0 2vw;
    }
    .bus-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .bus-route {
      font-size: 5vh;
      font-weight: 900;
      color: #ffcc00;
    }
    .bus-dest {
      font-size: 2.2vh;
      color: #cccccc;
    }
    .bus-eta-container {
      flex: 1.2;
      display: flex;
      justify-content: flex-end;
      gap: 3vw;
    }
    .eta-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      min-width: 10vw;
    }
    .eta-time {
      font-size: 4.5vh;
      font-weight: bold;
    }
    .eta-time.next-bus {
      color: #00ff00;
    }

    .block-weather {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: #111111;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 2vh 2vw;
      gap: 2vh;
      min-height: 0;
    }
    .weather-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .temp-text {
      font-size: 7vh;
      font-weight: bold;
    }
    .warning-container {
      flex: 1;
      border-top: 1px solid #333333;
      padding-top: 1.5vh;
    }
    .warning-list {
      display: flex;
      flex-wrap: wrap;
      gap: 1vh;
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <header class="block-header">
      <div class="time-box">
        <div id="clock" class="time-digital">00:00:00</div>
        <div id="date-string" class="date-text">----年--月--日 星期-</div>
      </div>
      <div id="notice-board" class="notice-box" style="color: #ffcc00; font-weight: bold;">核心引擎啟動中...</div>
    </header>

    <main class="main-content">
      <section id="bus-panel" class="block-bus"></section>
      <section class="block-weather">
        <div class="weather-info">
          <div><div id="temp-display" class="temp-text">--°C</div></div>
          <div id="weather-icon"></div>
        </div>
        <div class="warning-container">
          <div id="warning-list" class="warning-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const DOM = {
      clock: document.getElementById('clock'),
      dateString: document.getElementById('date-string'),
      noticeBoard: document.getElementById('notice-board'),
      busPanel: document.getElementById('bus-panel')
    };

    function updateClock() {
      const now = new Date();
      DOM.clock.textContent = now.toLocaleTimeString('zh-HK', { hour12: false });
      DOM.dateString.textContent = now.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    /**
     * 主動逆向診斷引擎：當 window.DASHBOARD_CONFIG 不存在時自動觸發
     */
    async function runDiagnostic() {
      DOM.noticeBoard.style.color = "#ff3333";
      DOM.noticeBoard.style.backgroundColor = "#330000";
      DOM.noticeBoard.textContent = "【診斷中】正在探測 config.js 狀態...";

      try {
        // 使用 Cache-busting 迫使伺服器回傳真實狀況
        const response = await fetch(`config.js?t=${Date.now()}`);
        
        if (!response.ok) {
          DOM.noticeBoard.innerHTML = `【錯誤：網絡 404】GitHub 伺服器回傳找不到 config.js。<br>請檢查檔案是否真的放在根目錄，或英文檔名大小寫不對。`;
          return;
        }

        const text = await response.text();
        
        if (text.trim() === "") {
          DOM.noticeBoard.innerHTML = `【錯誤：空檔案】config.js 成功下載，但內容是空的！`;
          return;
        }

        if (!text.includes("DASHBOARD_CONFIG")) {
          DOM.noticeBoard.innerHTML = `【錯誤：結構損壞】config.js 存在，但入面找不到 DASHBOARD_CONFIG 變數名稱。`;
          return;
        }

        // 如果走到這一步，代表檔案存在且有內容，但瀏覽器拒絕執行
        DOM.noticeBoard.innerHTML = `【錯誤：語法或編碼崩潰】config.js 存在，但裏面有語法錯誤（例如少括號、錯用全角標點）導致瀏覽器解析失敗。`;
        
      } catch (err) {
        DOM.noticeBoard.innerHTML = `【錯誤：連線中斷】無法讀取 config.js: ${err.message}`;
      }
    }

    function initLayout() {
      // 核心邏輯：驗證設定檔是否存在
      if (!window.DASHBOARD_CONFIG) {
        runDiagnostic();
        return;
      }

      // 載入成功後的正常渲染流程
      DOM.noticeBoard.style.color = "#ffffff";
      DOM.noticeBoard.style.backgroundColor = "#1a1a1a";
      DOM.noticeBoard.textContent = window.DASHBOARD_CONFIG.topNoticeText;
      
      // 渲染巴士骨架
      DOM.busPanel.innerHTML = '';
      window.DASHBOARD_CONFIG.busRoutes.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'bus-row';
        row.innerHTML = `
          <div class="bus-meta">
            <div class="bus-route">${item.route}</div>
            <div class="bus-dest">${item.label || ''}</div>
          </div>
          <div class="bus-eta-container">
            <div class="eta-item"><div class="eta-time next-bus">--</div></div>
          </div>
        `;
        DOM.busPanel.appendChild(row);
      });
    }

    setInterval(updateClock, 1000);
    updateClock();
    document.addEventListener('DOMContentLoaded', initLayout);
  </script>
</body>
</html>
