<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bus & Weather Dashboard (Production Ready)</title>
  <script src="config.js"></script>
  <style>
    /* 全局重設 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* 主容器佈局 */
    .dashboard-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 2vh 2vw;
      gap: 2vh;
    }

    /* 區塊 A：時間與提示文字 */
    .block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #333333;
      padding-bottom: 1.5vh;
      height: 12vh;
    }
    .time-box {
      display: flex;
      flex-direction: column;
    }
    .time-digital {
      font-size: 5.5vh;
      font-weight: bold;
      color: #00ffcc;
      line-height: 1;
    }
    .date-text {
      font-size: 2.2vh;
      color: #aaaaaa;
      margin-top: 0.5vh;
    }
    .notice-box {
      font-size: 2.5vh;
      color: #ffffff;
      background-color: #1a1a1a;
      padding: 1.5vh 2vw;
      border-radius: 8px;
      max-width: 60%;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 中下部主內容分佈 */
    .main-content {
      display: flex;
      flex: 1;
      gap: 2vw;
      min-height: 0;
    }

    /* 區塊 B：九巴 ETA 顯示板 */
    .block-bus {
      flex: 1.6;
      display: flex;
      flex-direction: column;
      gap: 1.5vh;
      min-height: 0;
    }
    .bus-row {
      flex: 1;
      display: flex;
      align-items: center;
      background-color: #111111;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 0 2vw;
    }
    .bus-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .bus-route {
      font-size: 5vh;
      font-weight: 900;
      color: #ffcc00;
      line-height: 1.1;
    }
    .bus-dest {
      font-size: 2.2vh;
      color: #cccccc;
      margin-top: 0.5vh;
    }
    .bus-eta-container {
      flex: 1.2;
      display: flex;
      justify-content: flex-end;
      gap: 3vw;
    }
    .eta-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      min-width: 10vw;
    }
    .eta-time {
      font-size: 4.5vh;
      font-weight: bold;
      color: #ffffff;
    }
    .eta-time.next-bus {
      color: #00ff00;
    }
    .eta-rmk {
      font-size: 1.6vh;
      color: #888888;
      margin-top: 0.2vh;
    }

    /* 區塊 C：即時天氣與警告 */
    .block-weather {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: #111111;
      border: 1px solid #222222;
      border-radius: 12px;
      padding: 2vh 2vw;
      gap: 1.5vh;
      min-height: 0;
    }
    .weather-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .weather-metrics {
      display: flex;
      flex-direction: column;
      gap: 1vh;
    }
    .temp-text {
      font-size: 7vh;
      font-weight: bold;
      color: #ffffff;
      line-height: 1;
    }
    .humidity-text, .uv-text {
      font-size: 2.5vh;
      color: #bbbbbb;
    }
    .weather-icon-box {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 12vh;
      height: 12vh;
    }
    .weather-icon-box img {
      height: 12vh;
      width: auto;
      object-fit: contain;
    }

    /* 天氣警告訊號 */
    .warning-container {
      flex: 1;
      border-top: 1px solid #333333;
      padding-top: 1vh;
      display: flex;
      flex-direction: column;
      gap: 1vh;
      overflow-y: auto;
    }
    .warning-title {
      font-size: 2vh;
      color: #888888;
      font-weight: bold;
    }
    .warning-list {
      display: flex;
      flex-wrap: wrap;
      gap: 1vh;
    }
    .warning-badge {
      background-color: #cc0000;
      color: #ffffff;
      font-size: 2vh;
      font-weight: bold;
      padding: 0.6vh 1.2vw;
      border-radius: 6px;
    }

    /* 內嵌智能搵站助手專屬樣式 */
    .finder-panel {
      border-top: 1px solid #333333;
      padding-top: 1vh;
      display: flex;
      flex-direction: column;
      gap: 0.8vh;
    }
    .finder-title {
      font-size: 2vh;
      color: #00ffcc;
      font-weight: bold;
    }
    .finder-row {
      display: flex;
      gap: 1vw;
    }
    .finder-input {
      flex: 1;
      background-color: #222222;
      border: 1px solid #444444;
      color: #ffffff;
      padding: 0.8vh 1vw;
      border-radius: 6px;
      font-size: 1.8vh;
    }
    .finder-btn {
      background-color: #00ffcc;
      color: #000000;
      border: none;
      padding: 0.8vh 1.5vw;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1.8vh;
      cursor: pointer;
    }
    .finder-results {
      background-color: #1a1a1a;
      border-radius: 6px;
      padding: 1vh;
      font-size: 1.6vh;
      max-height: 15vh;
      overflow-y: auto;
      border: 1px solid #222222;
    }

    @media (orientation: portrait) {
      .main-content { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <header class="block-header">
      <div class="time-box">
        <div id="clock" class="time-digital">00:00:00</div>
        <div id="date-string" class="date-text">----年--月--日 星期-</div>
      </div>
      <div id="notice-board" class="notice-box">聯網中...</div>
    </header>

    <main class="main-content">
      <section id="bus-panel" class="block-bus"></section>

      <section class="block-weather">
        <div class="weather-info">
          <div class="weather-metrics">
            <div id="temp-display" class="temp-text">--°C</div>
            <div id="humidity-display" class="humidity-text">相對濕度：--%</div>
            <div id="uv-display" class="uv-text">UV 指數：--</div>
          </div>
          <div id="weather-icon" class="weather-icon-box"></div>
        </div>
        
        <div class="warning-container">
          <div class="warning-title">當前生效天氣警告：</div>
          <div id="warning-list" class="warning-list"></div>
        </div>

        <div class="finder-panel">
          <div class="finder-title">🔍 智能搵站助手 (Yuen Long Stop Finder)</div>
          <div class="finder-row">
            <input id="f-input" type="text" class="finder-input" placeholder="鍵入站名關鍵字 (如: 形點、又新街、大棠路)">
            <button onclick="searchStopIds()" class="finder-btn">搜尋 ID</button>
          </div>
          <div id="f-results" class="finder-results" style="display:none;"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const config = window.DASHBOARD_CONFIG;
    const DOM = {
      clock: document.getElementById('clock'),
      dateString: document.getElementById('date-string'),
      noticeBoard: document.getElementById('notice-board'),
      busPanel: document.getElementById('bus-panel'),
      tempDisplay: document.getElementById('temp-display'),
      humidityDisplay: document.getElementById('humidity-display'),
      uvDisplay: document.getElementById('uv-display'),
      weatherIcon: document.getElementById('weather-icon'),
      warningList: document.getElementById('warning-list')
    };

    function updateClock() {
      const now = new Date();
      DOM.clock.textContent = now.toLocaleTimeString('zh-HK', { hour12: false });
      DOM.dateString.textContent = now.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    function initBusLayout() {
      DOM.noticeBoard.textContent = config.topNoticeText;
      DOM.busPanel.innerHTML = '';
      config.busRoutes.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'bus-row';
        row.innerHTML = `
          <div class="bus-meta">
            <div class="bus-route">${item.route}</div>
            <div class="bus-dest">${item.label || ''}</div>
          </div>
          <div class="bus-eta-container">
            <div class="eta-item"><div id="eta-${index}-0-time" class="eta-time next-bus">--</div><div id="eta-${index}-0-rmk" class="eta-rmk"></div></div>
            <div class="eta-item"><div id="eta-${index}-1-time" class="eta-time">--</div><div id="eta-${index}-1-rmk" class="eta-rmk"></div></div>
          </div>
        `;
        DOM.busPanel.appendChild(row);
      });
    }

    async function fetchBusETA() {
      const now = new Date();
      for (let i = 0; i < config.busRoutes.length; i++) {
        const target = config.busRoutes[i];
        if (!target.stopId || target.stopId.includes("填入")) {
          document.getElementById(`eta-${i}-0-time`).textContent = "未設ID";
          continue;
        }
        try {
          const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${target.stopId}`);
          const json = await response.json();
          const filtered = (json.data || []).filter(item => item.route === target.route);
          const sorted = filtered.filter(item => item.eta).sort((a, b) => new Date(a.eta) - new Date(b.eta));

          for (let seq = 0; seq < 2; seq++) {
            const timeEl = document.getElementById(`eta-${i}-${seq}-time`);
            const rmkEl = document.getElementById(`eta-${i}-${seq}-rmk`);
            if (sorted[seq]) {
              const diffMins = Math.max(0, Math.floor((new Date(sorted[seq].eta) - now) / 60000));
              timeEl.textContent = diffMins === 0 ? "即將到站" : `${diffMins} 分鐘`;
              rmkEl.textContent = sorted[seq].rmk_tc || "";
            } else {
              timeEl.textContent = seq === 0 ? "暫無班次" : "--"; rmkEl.textContent = "";
            }
          }
        } catch (error) { document.getElementById(`eta-${i}-0-time`).textContent = "讀取失敗"; }
      }
    }

    /**
     * 智能搵站核心控制引擎：由 iPad 瀏覽器前端代發高能解碼
     */
    async function searchStopIds() {
      const keyword = document.getElementById('f-input').value.trim();
      if (!keyword) return alert('請先輸入關鍵字！');
      const resultsEl = document.getElementById('f-results');
      resultsEl.style.display = 'block';
      resultsEl.innerHTML = '<span style="color:#00ffcc;">正在逆向掃描元朗大馬路沿線站點...</span>';

      try {
        let html = '<table style="width:100%; text-align:left; border-collapse:collapse;">';
        html += '<tr style="color:#ffcc00;"><th style="padding:4px;">路線</th><th style="padding:4px;">對應真實站名</th><th style="padding:4px;">站點 ID (長按複制)</th></tr>';
        let foundCount = 0;

        for (let r of config.busRoutes) {
          const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${r.route}/outbound/1`);
          const json = await res.json();
          // 這些路線前12站完美包攬整個元朗核心生活圈
          const candidates = (json.data || []).slice(0, 12);

          for (let c of candidates) {
            const stopRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${c.stop}`);
            const stopJson = await stopRes.json();
            const sName = stopJson.data?.name_tc || '';

            if (sName.includes(keyword)) {
              foundCount++;
              html += `<tr style="border-bottom:1px solid #333;">
                <td style="padding:6px; color:#ffcc00; font-weight:bold;">${r.route}</td>
                <td style="padding:6px;">${sName}</td>
                <td style="padding:6px; font-family:monospace; color:#00ffcc; user-select:all; background:#222;">${c.stop}</td>
              </tr>`;
            }
          }
        }
        html += '</table>';
        resultsEl.innerHTML = foundCount === 0 ? '<span style="color:#ff3333;">❌ 找不到包含該字眼的元朗站點，請試試輸入「形點」、「又新街」或「大棠路」。</span>' : html;
      } catch (err) { resultsEl.innerHTML = '搜尋出錯: ' + err.message; }
    }

    async function fetchWeather() {
      const cacheBust = `&_=${Date.now()}`;
      try {
        const res = await fetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc${cacheBust}`);
        const data = await res.json();
        if (data.temperature?.data?.length > 0) DOM.tempDisplay.textContent = `${data.temperature.data[0].value}°C`;
        if (data.humidity?.data?.length > 0) DOM.humidityDisplay.textContent = `相對濕度：${data.humidity.data[0].value}%`;
        if (data.uvindex?.data?.length > 0) { DOM.uvDisplay.textContent = `UV 指數：${data.uvindex.data[0].value}`; DOM.uvDisplay.style.display = 'block'; } else { DOM.uvDisplay.style.display = 'none'; }
        if (data.icon?.length > 0) DOM.weatherIcon.innerHTML = `<img src="https://www.hko.gov.hk/images/HKOWeatherIcon/pic${data.icon[0]}.png" alt="Weather" onerror="this.style.display='none';">`;
      } catch (e) { DOM.tempDisplay.textContent = "網絡錯誤"; }

      try {
        const res = await fetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc${cacheBust}`);
        const data = await res.json();
        const keys = Object.keys(data);
        DOM.warningList.innerHTML = keys.length === 0 ? '<span style="color:#00ff00;font-weight:bold;">現時無生效天氣警告</span>' : keys.map(k => `<span class="warning-badge">${data[k].name}</span>`).join('');
      } catch (e) { DOM.warningList.innerHTML = '更新失敗'; }
    }

    function startScheduler() {
      async function updateAllData() { await Promise.allSettled([fetchBusETA(), fetchWeather()]); }
      setInterval(updateClock, 1000);
      setInterval(updateAllData, config.updateIntervalMs);
      updateClock(); initBusLayout(); updateAllData();
    }
    document.addEventListener('DOMContentLoaded', startScheduler);
  </script>
</body>
</html>
